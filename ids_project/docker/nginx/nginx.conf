# ============================================================
# NetIDS — Production Nginx Configuration
# ============================================================
# Reverse proxy for Gunicorn + Flask-SocketIO (eventlet).
# Features:
#   - HTTP → HTTPS redirect
#   - WebSocket proxy for /socket.io/
#   - Static file serving with caching
#   - Security headers (CSP, HSTS, etc.)
#   - Gzip compression
#   - Rate limiting on auth endpoints
# ============================================================

# --- Rate limit zones -----------------------------------------
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=120r/m;

# --- Upstream (Gunicorn eventlet workers) ----------------------
upstream netids_app {
    server app:5000 fail_timeout=0;
    keepalive 32;
}

# --- HTTP redirect to HTTPS -----------------------------------
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS main server ----------------------------------------
server {
    listen 443 ssl http2;
    server_name _;

    # ---- TLS / SSL ----
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Gzip ----
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # ---- Limits ----
    client_max_body_size 10M;

    # ---- Static assets (served directly by Nginx) ----
    location /static/ {
        alias /app/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Rate-limited auth endpoints ----
    location ~ ^/auth/(login|verify-2fa) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://netids_app;
        include /etc/nginx/proxy_params;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://netids_app;
        include /etc/nginx/proxy_params;
    }

    # ---- Rate-limited general API ----
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://netids_app;
        include /etc/nginx/proxy_params;
    }

    # ---- WebSocket (Flask-SocketIO) ----
    location /socket.io/ {
        proxy_pass http://netids_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ---- Health check (no auth required) ----
    location /health {
        proxy_pass http://netids_app;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # ---- All other requests → Flask ----
    location / {
        proxy_pass http://netids_app;
        include /etc/nginx/proxy_params;
    }
}
