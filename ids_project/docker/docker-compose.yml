version: "3.9"

services:
  # ============================================
  # PostgreSQL 15 Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ids_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ids_user
      POSTGRES_PASSWORD: ids_secure_password_change_me
      POSTGRES_DB: ids_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ids_user -d ids_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ids_network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ids_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ids_network

  # ============================================
  # Mailhog (Development SMTP Server)
  # ============================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ids_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - ids_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ids_network:
    driver: bridge
