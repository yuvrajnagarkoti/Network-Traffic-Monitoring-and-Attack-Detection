<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Network IDS</title>
  <meta name="description" content="Secure login to the Network Intrusion Detection System console." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body class="dark-theme login-page">
  <div class="login-background">
    <div class="login-grid"></div>
  </div>

  <div class="login-container">
    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon-lg">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="brand-name-lg">NetIDS</h1>
      <p class="brand-tagline">Network Intrusion Detection System</p>
    </div>

    <!-- Login form -->
    <div class="login-card glass-card" id="login-card">
      <h2 class="login-title">Sign In</h2>

      <div class="form-error" id="form-error" role="alert" hidden></div>

      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            placeholder="Enter your username"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-with-toggle">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden" aria-hidden="true"></span>
        </button>
      </form>

      <!-- TOTP step (hidden initially) -->
      <div class="totp-section hidden" id="totp-section">
        <p class="totp-instruction">Enter the 6-digit code from your authenticator app.</p>
        <form class="login-form" id="totp-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="totp-code">Authenticator Code</label>
            <input
              class="form-input totp-input"
              type="text"
              id="totp-code"
              name="totp_code"
              inputmode="numeric"
              pattern="[0-9]{6}"
              maxlength="6"
              placeholder="000000"
              autocomplete="one-time-code"
            />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="totp-btn">
            <span class="btn-text">Verify</span>
            <span class="btn-spinner hidden" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </div>

    <p class="login-footer">Unauthorized access is prohibited and monitored.</p>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    IDS.initLoginPage();
  </script>
</body>
</html>
